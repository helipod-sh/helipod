name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: build-typecheck-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: bun-turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-turbo-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck
      - run: bun run test

  changeset-present:
    name: changeset reminder
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: warn when a code change ships without a changeset
        run: bunx changeset status --since=origin/main
