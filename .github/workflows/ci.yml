name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: build-typecheck-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: bun-turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            bun-turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            bun-turbo-${{ runner.os }}-
      - name: detect versions-only diff (release PRs)
        id: diffkind
        if: github.event_name == 'pull_request'
        run: |
          git fetch -q origin ${{ github.base_ref }}
          nonrelease=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD \
            | grep -v -E '(^|/)package\.json$|(^|/)CHANGELOG\.md$|^\.changeset/|^bun\.lock$' | head -1 || true)
          if [ -z "$nonrelease" ]; then
            echo "versions_only=true" >> "$GITHUB_OUTPUT"
            echo "versions-only diff: running install+build (lockfile/pin validation), skipping typecheck+tests"
          else
            echo "versions_only=false" >> "$GITHUB_OUTPUT"
          fi
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck
        if: steps.diffkind.outputs.versions_only != 'true'
      - run: bun run test
        if: steps.diffkind.outputs.versions_only != 'true'

  changeset-present:
    name: changeset reminder
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: warn when a code change ships without a changeset
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch -q origin ${{ github.base_ref }}
          code=$(git diff --name-only "$base"...HEAD -- packages components ee/packages apps/dashboard | grep -v -E '(^|/)test/|\.test\.|README\.md$' | head -1 || true)
          cs=$(git diff --name-only "$base"...HEAD -- .changeset | grep '\.md$' | head -1 || true)
          if [ -n "$code" ] && [ -z "$cs" ]; then
            echo "::warning::This PR changes published-package code ($code ...) but adds no changeset. Run: bunx changeset"
            exit 1
          fi
          echo "ok: changeset present or no published-package code changed"
