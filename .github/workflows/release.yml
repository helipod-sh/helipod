name: Release

on:
  push:
    branches: [main]

# Never cancel a release mid-flight: tags and npm publishes must complete as a
# unit, and the publish script is re-runnable if a run dies. Queue instead.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: version-or-publish
    runs-on: ubuntu-latest
    if: github.repository == 'helipod-sh/helipod'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # OIDC trusted publishing requires npm >= 11.5
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - name: create Version Packages PR, or publish on its merge
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
