name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "website/**"
      - ".agents/**"
      - ".changeset/**"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: serial e2e lane
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: bun-turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            bun-turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            bun-turbo-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test:e2e
