<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stackbase Auth Demo</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.5 system-ui, sans-serif;
        background: #0b0c10;
        color: #e6e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
      }
      .app { width: 100%; max-width: 480px; padding: 2rem; }
      h1 { font-size: 1.4rem; margin: 0 0 1.5rem; }
      .status-box {
        padding: 1rem;
        border-radius: 10px;
        background: #14161d;
        border: 1px solid #232734;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
      }
      .status-box .label { color: #8b8e98; font-size: 0.8rem; margin-bottom: 0.25rem; }
      .status-box .value { color: #4ade80; font-family: monospace; word-break: break-all; }
      .status-box .value.empty { color: #6b6f7a; }
      fieldset { border: 1px solid #232734; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
      legend { color: #8b8e98; font-size: 0.85rem; padding: 0 0.4rem; }
      label { display: block; font-size: 0.85rem; color: #9aa0ad; margin-bottom: 0.15rem; }
      input[type="email"], input[type="password"], input[type="text"], textarea {
        width: 100%; padding: 0.5rem 0.7rem; border-radius: 8px; border: 1px solid #2a2f3d;
        background: #0b0c10; color: inherit; font: inherit; margin-bottom: 0.75rem;
      }
      textarea { resize: vertical; }
      .hint { color: #6b6f7a; font-size: 0.8rem; margin: 0.25rem 0 0.75rem; }
      .btn-row { display: flex; gap: 0.5rem; }
      button {
        flex: 1; padding: 0.55rem 1rem; border: 0; border-radius: 8px;
        background: #2563eb; color: white; font: inherit; cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
      button.secondary { background: #374151; }
      button.secondary:hover { background: #4b5563; }
      button.danger { background: #dc2626; }
      button.danger:hover { background: #b91c1c; }
      .error { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; }
      footer { color: #6b6f7a; font-size: 0.78rem; text-align: center; margin-top: 2rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
